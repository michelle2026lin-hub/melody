<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>示例型号二（复制上面这段改就行） — Hongtai Precision Hardware</title>

<!-- Open Graph tags: 平台抓取程序只读这些静态标签，不执行下面的跳转脚本 -->
<meta property="og:type" content="product">
<meta property="og:title" content="示例型号二（复制上面这段改就行） — Hongtai Precision Hardware">
<meta property="og:description" content="在这里写一句卖点">
<meta property="og:image" content="https://michelle2026lin-hub.github.io/melody/assets/images/og-default.jpg">
<meta property="og:url" content="https://michelle2026lin-hub.github.io/melody/p/H002.html">

<!-- Twitter Card 兜底（部分场景会用到） -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="示例型号二（复制上面这段改就行） — Hongtai Precision Hardware">
<meta name="twitter:description" content="在这里写一句卖点">
<meta name="twitter:image" content="https://michelle2026lin-hub.github.io/melody/assets/images/og-default.jpg">

<!-- 真人访客：0 秒跳转到正式产品页，cid 参数自动透传 -->
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var cid = params.get('cid');
    var target = 'product.html?model=H002' + (cid ? '&cid=' + encodeURIComponent(cid) : '');
    window.location.replace('../' + target);
  })();
</script>
<meta http-equiv="refresh" content="0; url=../product.html?model=H002">
</head>
<body>
  <p>Redirecting to <a href="../product.html?model=H002">示例型号二（复制上面这段改就行） — Hongtai Precision Hardware</a>…</p>
</body>
</html>
